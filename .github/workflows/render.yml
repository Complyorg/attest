name: Render Attestation Pages

on:
  push:
    branches: [main]
    paths:
      - "**/attestation.json"
      - "_render/**"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install renderer dependencies
        run: npm ci --prefix _render

      - name: Render vendor pages
        run: node _render/render.mjs

      - name: Render directory index
        run: node _render/render-index.mjs

      - name: Commit rendered pages
        run: |
          git config user.name "comply-bot"
          git config user.email "bot@comply.org"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Render attestation pages — $(date -u +%Y-%m-%d)"
            git push
          fi
